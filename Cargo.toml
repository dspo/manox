# manox —— 进程内 native agent 工作台（按 zed agent 架构重新实现）。
#
# workspace 根。三 crate（镜像 zed 的 agent / agent_ui / zed 三分）：
#   - agent:     agent 逻辑核心（Thread + LanguageModel + tools + db，gpui-native，不依赖 gpui-component）
#   - agent-ui:  UI 层（Workspace + ConversationState + views，gpui + gpui-component）
#   - manox:     薄 bin（窗口 + 主题 + 接线）
#
# LLM 直连 ~/.config/cx/cx.providers.config.yaml 定义的 providers（不走 codex / Zed Cloud）。
#
# gpui 相关依赖严格对齐 gpui-component 锁定的 zed rev，保证 gpui 单一版本。
[workspace]
members = ["crates/agent", "crates/agent-ui", "crates/manox", "crates/rich_text"]
resolver = "2"

[workspace.package]
edition = "2024"
version = "0.1.0"
publish = false

[workspace.dependencies]
anyhow = "1"
async-channel = "2"
futures = "0.3"
tokio = { version = "1", features = ["rt-multi-thread", "sync", "macros", "time", "process", "io-util"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
schemars = { version = "0.8", features = ["derive"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "rustls-tls"] }
rusqlite = { version = "0.32", features = ["bundled"] }
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
globset = "0.4"
ignore = "0.4"
grep-searcher = "0.1"
grep-regex = "0.1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# GPUI 栈 —— git 仓库地址（规则允许）。gpui-component 锁定 zed rev 1d217ee，三者必须一致。
gpui = { git = "https://github.com/zed-industries/zed", rev = "1d217ee39d381ac101b7cf49d3d22451ac1093fe" }
gpui_platform = { git = "https://github.com/zed-industries/zed", rev = "1d217ee39d381ac101b7cf49d3d22451ac1093fe", features = ["font-kit", "x11", "wayland", "runtime_shaders"] }

# gpui-component（longbridge）—— git rev a9a7341（upstream main HEAD，2026-07-02）
gpui-component = { git = "https://github.com/longbridge/gpui-component", rev = "a9a7341c35b62f27ff512371c62419342264710c" }
gpui-component-assets = { git = "https://github.com/longbridge/gpui-component", rev = "a9a7341c35b62f27ff512371c62419342264710c" }

# gpui-rich-text —— manox first-party crate（作者本人代码，并入 workspace 自维护）。
# 官方 gpui-component 仓库无此 crate，故作为 manox 成员引入，非第三方依赖。
gpui-rich-text = { path = "crates/rich_text" }

# rich_text 依赖（与 gpui-component main 的 workspace.dependencies 对齐）
ropey = { version = "=2.0.0-beta.1", features = ["metric_lines_lf", "metric_utf16"] }
sum-tree = { version = "0.2.0", package = "zed-sum-tree" }

# psm 用 stacker 的版本（对齐 gpui-component）
[patch.crates-io]
psm = { git = "https://github.com/rust-lang/stacker", branch = "master" }

# rich_text 作为 workspace 成员继承此 clippy 表（与 gpui-component main 对齐，避免 clippy 噪音）。
# agent / agent-ui / manox 用各自 inline [lints.clippy]，不继承，不受影响。
[workspace.lints.clippy]
almost_complete_range = "allow"
arc_with_non_send_sync = "allow"
borrowed_box = "allow"
dbg_macro = "deny"
let_underscore_future = "allow"
manual_is_multiple_of = "allow"
map_entry = "allow"
module_inception = "allow"
non_canonical_partial_ord_impl = "allow"
reversed_empty_ranges = "allow"
single_range_in_vec_init = "allow"
style = { level = "allow", priority = -1 }
todo = "deny"
too_many_arguments = "allow"
type_complexity = "allow"

# gpui 在 debug 下也需要 opt-level 3，否则渲染极慢（对齐 gpui-component）
[profile.dev.package]
gpui = { opt-level = 3 }
gpui_platform = { opt-level = 3 }
